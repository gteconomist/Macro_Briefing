name: Daily Macro Briefing

on:
  schedule:
    # GitHub Actions cron is UTC. 7 AM ET = 11:00 UTC during EDT (Mar-Nov),
    # 12:00 UTC during EST (Nov-Mar). Run at both; the script checks ET hour
    # and exits if it's not actually 7 AM ET, so only one fires per day.
    - cron: "0 11 * * 1-5"
    - cron: "0 12 * * 1-5"
  workflow_dispatch:        # allow manual runs from the Actions tab
    inputs:
      skip_time_check:
        description: "Skip the 7-AM-ET gate (use for manual test runs)"
        required: false
        default: "true"

permissions:
  contents: write           # so the job can commit the briefing back to the repo

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate on 7 AM ET (skip duplicate cron fire)
        id: gate
        env:
          SKIP_GATE: ${{ github.event.inputs.skip_time_check }}
        run: |
          if [ "$SKIP_GATE" = "true" ]; then
            echo "Manual run — skipping gate."
            echo "go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          echo "Current hour in ET: $ET_HOUR"
          if [ "$ET_HOUR" = "07" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 7 AM ET — exiting cleanly."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing
        if: steps.gate.outputs.go == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefing.py

      - name: Email briefing
        if: steps.gate.outputs.go == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_RECIPIENT: ${{ secrets.BRIEFING_RECIPIENT }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: python scripts/send_email.py

      - name: Commit briefing back to repo
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name "macro-briefing-bot"
          git config user.email "actions@github.com"
          git add briefings/ latest.md cache/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Briefing for $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi
