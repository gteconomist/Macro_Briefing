name: Daily Macro Briefing

on:
  # Timing is driven externally by the Cowork scheduled task, which bumps
  # .github/briefing-trigger on main at 7 AM ET on weekdays. Any push to that
  # file starts a run. GitHub's own schedule: cron was retired because it fires
  # unreliably on this repo, and the ET-hour gate is gone with it — the
  # scheduled task now controls timing.
  push:
    branches: [main]
    paths:
      - ".github/briefing-trigger"
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # so the job can commit the briefing back to the repo

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate briefing
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          METALPRICE_API_KEY: ${{ secrets.METALPRICE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Calendar feeds, each stored as "Label|URL" (webcal:// is fine)
          CAL_FEED_1: ${{ secrets.CAL_FEED_1 }}
          CAL_FEED_2: ${{ secrets.CAL_FEED_2 }}
          CAL_FEED_3: ${{ secrets.CAL_FEED_3 }}
          CAL_FEED_4: ${{ secrets.CAL_FEED_4 }}
        run: python scripts/generate_briefing.py

      - name: Email briefing
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_RECIPIENT: ${{ secrets.BRIEFING_RECIPIENT }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: python scripts/send_email.py

      # Archive the briefing to the repo even if the email step failed (e.g. a
      # bounce). always() decouples this from the email step's success so we
      # never lose the day's archive; the run still shows red when email fails.
      # Only briefings/, latest.md and cache/ are committed -- never the trigger
      # file -- so this push cannot re-trigger the workflow.
      - name: Commit briefing back to repo
        if: ${{ always() }}
        run: |
          git config user.name "macro-briefing-bot"
          git config user.email "actions@github.com"
          git add briefings/ latest.md cache/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Briefing for $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi
